# Deploy the momentum GitHub Pages site (Astro Starlight) to
# trymomentum.github.io via cross-repo push.
#
# Source repo:   avinash-singh-io/momentum         (this repo — site under /site)
# Deploy target: trymomentum/trymomentum.github.io (org-owned User/Org Pages repo)
#
# Auth uses a Fine-grained PAT stored as `PAGES_DEPLOY_TOKEN` in this
# repo's Actions secrets. The token only needs `Contents: Read and write`
# on the single target repo.
#
# GitHub Pages on the target repo must be configured to serve from
# `Deploy from a branch → main / root` (NOT "GitHub Actions" — the build
# happens here, the target just hosts the static output).
#
# Site URL: https://trymomentum.github.io/

name: Deploy site to trymomentum.github.io

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Prepare dist for GitHub Pages
        run: |
          touch site/dist/.nojekyll

      - name: Deploy dist → trymomentum/trymomentum.github.io
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          cd site/dist
          git init -q -b main
          git config commit.gpgsign false
          git add -A
          git commit -q -m "Deploy ${GITHUB_REPOSITORY}@${GITHUB_SHA::8}"
          git push --force -q \
            "https://x-access-token:${PAGES_DEPLOY_TOKEN}@github.com/trymomentum/trymomentum.github.io.git" \
            main
