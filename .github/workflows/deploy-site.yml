# Deploy the momentum GitHub Pages site (custom Astro) to
# trymomentum.github.io via cross-repo push.
#
# Source repo:   avinash-singh-io/momentum         (this repo — site under /site)
# Deploy target: trymomentum/trymomentum.github.io (org-owned User/Org Pages repo)
#
# Auth uses a Fine-grained PAT stored as `PAGES_DEPLOY_TOKEN` in this
# repo's Actions secrets. The token only needs `Contents: Read and write`
# on the single target repo.
#
# GitHub Pages on the target repo is configured as `Source: GitHub
# Actions`: a minimal `Publish Pages` workflow in the target repo uploads
# main/ verbatim via actions/deploy-pages on every push. (Switched
# 2026-07-03 — the legacy "Deploy from a branch" pipeline began failing
# every build with a detail-less "Page build failed"; the Actions path
# serves the pushed files without the legacy Jekyll builder.)
#
# Site URL: https://trymomentum.github.io/

name: Deploy site to trymomentum.github.io

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      # Phase 13 (v0.16.0+) renders Mermaid blocks to inline SVG at
      # build time via rehype-mermaid + Playwright + headless Chromium.
      # Install Chromium AND chromium-headless-shell with OS deps: the
      # headless shell is a separate download, and without it mermaid
      # pages render EMPTY while the build still exits 0 (BUG-013; the
      # site's postbuild content gate now catches that case).
      - name: Install Playwright Chromium
        working-directory: site
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Prepare dist for GitHub Pages
        run: |
          touch site/dist/.nojekyll
          # Hop-2 publisher: the deploy step below force-pushes site/dist as
          # the target repo's ENTIRE main, which wipes the target's own Pages
          # publish workflow. Ship it INSIDE dist so every deploy re-lands it;
          # the force-push then triggers it → actions/deploy-pages → live.
          # (Requires PAGES_DEPLOY_TOKEN to allow pushes under .github/workflows/.)
          mkdir -p site/dist/.github/workflows
          echo '' \
            | base64 -d > site/dist/.github/workflows/publish.yml

      - name: Deploy dist → trymomentum/trymomentum.github.io
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          cd site/dist
          git init -q -b main
          git config commit.gpgsign false
          git add -A
          git commit -q -m "Deploy ${GITHUB_REPOSITORY}@${GITHUB_SHA::8}"
          git push --force -q \
            "https://x-access-token:${PAGES_DEPLOY_TOKEN}@github.com/trymomentum/trymomentum.github.io.git" \
            main
