# Deploy the momentum GitHub Pages site (Astro Starlight)
#
# Status: DRAFT — active triggers are commented out and re-enabled at the
# end of Phase 12 Group 4 (Deployment Wiring), once Pages source has been
# switched to "GitHub Actions" in repo settings (User Action) and the
# site source under /site is complete.
#
# Site lives at: https://avinash-singh-io.github.io/momentum

name: Deploy site to GitHub Pages

# on:
#   push:
#     branches: [main]
#     paths:
#       - 'site/**'
#       - '.github/workflows/deploy-site.yml'
#   workflow_dispatch:

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
