<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
	<!-- momentum default OG card (1200 x 630 for Twitter/LinkedIn/Facebook) -->

	<!-- Background -->
	<rect width="1200" height="630" fill="#0F172A" />

	<!-- Subtle halo behind the mark -->
	<defs>
		<radialGradient id="halo" cx="62%" cy="42%" r="55%">
			<stop offset="0%" stop-color="#4F46E5" stop-opacity="0.18" />
			<stop offset="100%" stop-color="#4F46E5" stop-opacity="0" />
		</radialGradient>
	</defs>
	<rect width="1200" height="630" fill="url(#halo)" />

	<!-- Logo mark — concentric arcs + arrow (scaled up 8x from 64 viewBox) -->
	<g transform="translate(820 130)">
		<g stroke="#CBD5E1" stroke-width="20" stroke-linecap="round" fill="none">
			<path d="M 80 80 A 60 60 0 0 1 80 200" />
			<path d="M 80 30 A 110 110 0 0 1 80 250" />
			<path d="M 80 -20 A 160 160 0 0 1 80 300" />
		</g>
		<path d="M -20 280 Q 140 140 280 -10"
			stroke="#818CF8" stroke-width="44"
			stroke-linecap="round" fill="none" />
		<path d="M 200 -60 L 320 20 L 250 110 Z" fill="#818CF8" />
	</g>

	<!-- Wordmark text -->
	<text
		x="80"
		y="430"
		fill="#F8FAFC"
		font-family="'Inter Variable', Inter, system-ui, sans-serif"
		font-size="86"
		font-weight="700"
		letter-spacing="-0.02em"
	>momentum</text>

	<!-- Tagline -->
	<text
		x="80"
		y="490"
		fill="#CBD5E1"
		font-family="'Inter Variable', Inter, system-ui, sans-serif"
		font-size="32"
		font-weight="450"
		letter-spacing="-0.01em"
	>Spec-driven development for agentic AI</text>

	<!-- Footer ribbon -->
	<text
		x="80"
		y="572"
		fill="#94A3B8"
		font-family="'Inter Variable', Inter, system-ui, sans-serif"
		font-size="22"
		font-weight="500"
		letter-spacing="0"
	>Phases · Decisions · History · Backlog · Multi-project orchestration</text>
</svg>
