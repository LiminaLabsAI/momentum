<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
	<!-- momentum default OG card (1200 x 630 for Twitter/LinkedIn/Facebook) -->

	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
			<stop offset="0%" stop-color="#0a0d16" />
			<stop offset="100%" stop-color="#0d1330" />
		</linearGradient>
		<radialGradient id="halo" cx="82%" cy="14%" r="60%">
			<stop offset="0%" stop-color="#2f5be0" stop-opacity="0.42" />
			<stop offset="100%" stop-color="#2f5be0" stop-opacity="0" />
		</radialGradient>
		<linearGradient id="mark" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#2f5be0" />
			<stop offset="100%" stop-color="#0023ae" />
		</linearGradient>
	</defs>

	<!-- Background + cobalt halo -->
	<rect width="1200" height="630" fill="url(#bg)" />
	<rect width="1200" height="630" fill="url(#halo)" />

	<!-- Logo mark — three-chevron fast-forward trail in a rounded cobalt square -->
	<rect x="80" y="150" width="128" height="128" rx="30" fill="url(#mark)" />
	<g stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none">
		<path d="M 111 186 L 133 214 L 111 242" opacity="0.4" />
		<path d="M 133 186 L 155 214 L 133 242" opacity="0.7" />
		<path d="M 155 186 L 177 214 L 155 242" />
	</g>

	<!-- Wordmark -->
	<text
		x="240"
		y="248"
		fill="#f4f5fb"
		font-family="'Geist Variable', Geist, system-ui, sans-serif"
		font-size="104"
		font-weight="700"
		letter-spacing="-0.03em"
	>momentum</text>

	<!-- Headline -->
	<text
		x="84"
		y="392"
		fill="#e8ebf6"
		font-family="'Geist Variable', Geist, system-ui, sans-serif"
		font-size="52"
		font-weight="600"
		letter-spacing="-0.02em"
	>The right context for your coding agent.</text>

	<!-- Tagline -->
	<text
		x="84"
		y="452"
		fill="#9aa3c4"
		font-family="'Geist Variable', Geist, system-ui, sans-serif"
		font-size="30"
		font-weight="400"
		letter-spacing="-0.01em"
	>Durable project state your agent reads every session.</text>

	<!-- Footer ribbon -->
	<rect x="84" y="540" width="6" height="34" rx="3" fill="#2f5be0" />
	<text
		x="108"
		y="566"
		fill="#8b90a8"
		font-family="'Geist Variable', Geist, system-ui, sans-serif"
		font-size="24"
		font-weight="500"
	>Open source · Phases · Decisions · History · Backlog · Orchestration</text>
</svg>
