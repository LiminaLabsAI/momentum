<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
	<title>momentum mark</title>
	<!-- Velocity Arc: a thick curving stroke from lower-left, rising up to the right -->
	<path
		d="M 8 52 C 16 28 30 12 48 12"
		stroke="currentColor"
		stroke-width="10"
		stroke-linecap="round"
	/>
	<!-- Integrated arrowhead at the tip of the arc — points up-and-right -->
	<path d="M 40 4 L 60 16 L 44 30 Z" fill="currentColor" />
</svg>
